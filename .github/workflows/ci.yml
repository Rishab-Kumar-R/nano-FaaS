name: CI

on:
  push:
  pull_request:

jobs:
  test-gateway:
    name: Test gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - name: Test
        working-directory: gateway
        run: go test ./... -race -count=1

  test-worker:
    name: Test worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod
          cache-dependency-path: worker/go.sum

      - name: Test
        working-directory: worker
        run: go test ./... -race -count=1

  lint-gateway:
    name: Lint gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: gateway
          version: v1.65.0

  lint-worker:
    name: Lint worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod
          cache-dependency-path: worker/go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: worker
          version: v1.65.0

  build-images:
    name: Build images
    runs-on: ubuntu-latest
    needs: [test-gateway, test-worker]
    strategy:
      matrix:
        service: [gateway, worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
